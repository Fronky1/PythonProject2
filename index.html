<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оазис — SPA & Салон красоты в Губкине</title>
    <meta name="description" content="Персональный оазис релакса и красоты в Губкине">

    <!-- Tailwind CSS через CDN (удобно для разработки) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Шрифты Google -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        .heading-font {
            font-family: 'Playfair Display', serif;
        }

        /* Плавные анимации */
        .section-fade {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease-out;
        }
        .section-fade.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body class="bg-[#F5F0E8] text-[#2E2A26] leading-relaxed">

    <!-- НАВИГАЦИЯ -->
    <nav class="fixed top-0 left-0 right-0 bg-white/95 backdrop-blur-md z-50 border-b border-[#D4BFA8]/20">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="heading-font text-3xl font-semibold tracking-tight text-[#2E4F3C]">
                ОАЗИС
            </div>

            <div class="hidden md:flex items-center gap-8 text-sm font-medium">
                <a href="#services" class="hover:text-[#2E4F3C] transition-colors">Услуги</a>
                <a href="#certificates" class="hover:text-[#2E4F3C] transition-colors">Сертификаты</a>
                <a href="#team" class="hover:text-[#2E4F3C] transition-colors">Команда</a>
            </div>

            <a href="#booking"
               class="bg-[#2E4F3C] hover:bg-[#1F3A2B] text-white px-8 py-3.5 rounded-full text-sm font-medium transition-all">
                Записаться
            </a>
        </div>
    </nav>

    <!-- HERO -->
    <section class="min-h-screen bg-cover bg-center flex items-center relative"
             style="background-image: linear-gradient(rgba(46, 79, 60, 0.45), rgba(46, 79, 60, 0.45)), url('assets/images/hero.jpg');">

        <div class="max-w-5xl mx-auto px-6 text-center text-white pt-20">
            <h1 class="heading-font text-6xl md:text-7xl font-light leading-tight mb-6">
                Ваш персональный<br>оазис в Губкине
            </h1>
            <p class="text-xl md:text-2xl max-w-2xl mx-auto mb-12 text-white/90">
                Место, где тело отдыхает, а душа наполняется гармонией и спокойствием
            </p>

            <div class="flex flex-col sm:flex-row gap-5 justify-center">
                <a href="#booking"
                   class="bg-white text-[#2E4F3C] px-10 py-5 rounded-full text-lg font-medium hover:scale-105 transition-all">
                    Записаться онлайн
                </a>
                <a href="#certificates"
                   class="border-2 border-white text-white px-10 py-5 rounded-full text-lg font-medium hover:bg-white/10 transition-all">
                    Купить сертификат
                </a>
            </div>
        </div>

        <!-- Прокрутка вниз -->
        <div class="absolute bottom-10 left-1/2 -translate-x-1/2 flex flex-col items-center">
            <span class="text-white/70 text-sm tracking-widest">Прокрутить вниз</span>
            <div class="w-px h-12 bg-white/30 mt-3"></div>
        </div>
    </section>

    <!-- Здесь будут другие секции -->

    <script src="assets/js/main.js"></script>
</body>
</html>
